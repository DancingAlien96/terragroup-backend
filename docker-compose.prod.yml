services:
  db:
    image: mysql:8.1
    container_name: terragroup-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-terragroup}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: terragroup-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-rootpassword}
      DB_NAME: ${DB_NAME:-terragroup}
      # Construida desde DB_*; usada por Prisma migrate + adapter
      DATABASE_URL: mysql://${DB_USER:-root}:${DB_PASS:-rootpassword}@db:3306/${DB_NAME:-terragroup}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-terragroup_secret_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      # CSV de orígenes permitidos para CORS. Sin esta var en prod, todo origen es bloqueado.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,https://terragroup-frontend.vercel.app,http://192.168.1.140:3000}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      # WhatsApp Cloud API (Meta). Templates: pago_confirmado, recordatorio_cuota,
      # cuota_vencida, bienvenida_cliente. Sin estas vars, los mensajes se ignoran.
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_DEFAULT_COUNTRY: ${WHATSAPP_DEFAULT_COUNTRY:-502}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      WHATSAPP_RECORDATORIO_DIAS: ${WHATSAPP_RECORDATORIO_DIAS:-3}
      # Recurrente — pasarela de pago del SaaS
      FRONTEND_URL: ${FRONTEND_URL:-https://terragroup.urbandata.app}
      RECURRENTE_API_URL: ${RECURRENTE_API_URL:-https://app.recurrente.com/api}
      RECURRENTE_SECRET_KEY: ${RECURRENTE_SECRET_KEY}
      RECURRENTE_WEBHOOK_SECRET: ${RECURRENTE_WEBHOOK_SECRET}
      RECURRENTE_MONTO_CENTS: ${RECURRENTE_MONTO_CENTS:-200000}
      RECURRENTE_CURRENCY: ${RECURRENTE_CURRENCY:-USD}
      RECURRENTE_PRODUCT: ${RECURRENTE_PRODUCT:-TerraGroup — Licencia única}
      DEFAULT_PLAN_ID: ${DEFAULT_PLAN_ID:-1}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads:
